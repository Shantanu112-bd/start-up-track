name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: payra
          POSTGRES_PASSWORD: payra
          POSTGRES_DB: payra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://payra:payra@localhost:5432/payra_test
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate

      - name: Run database migrations
        run: cd apps/api && npx prisma migrate deploy

      - name: Build all packages
        run: npx turbo run build

      - name: Run tests
        run: npx turbo run test --passWithNoTests

      - name: Type check
        run: npx turbo run typecheck
